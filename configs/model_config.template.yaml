# Model and API Configuration for PaperVizAgent

# Default Models
defaults:
  model_name: "gemini-3.1-pro-preview"
  image_model_name: "gemini-3.1-flash-image-preview"
  #
  # Other available models (uncomment to use):
  #
  # --- Text generation ---
  # model_name: "gemini-2.5-pro-preview-06-05"
  #
  # --- Image generation ---
  # image_model_name: "gemini-2.0-flash-exp-image-generation"
 

# API Keys. If you are using all gemini models, you can leave the other keys empty.
api_keys:
  google_api_key: "" # e.g. "xxxxxxxxxxxxx"
  openai_api_key: ""
  anthropic_api_key: ""

# Google Cloud / Vertex AI (recommended)
# Set project_id here or via GOOGLE_CLOUD_PROJECT env var
# Ensure ADC is configured: gcloud auth application-default login
google_cloud:
  project_id: "" # e.g. "my-project-12345"
  location: "global" # e.g. "global", "us-central1"
